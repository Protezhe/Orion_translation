<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Парковое радио — Вход</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #0f0f17;
      --card:  #1a1a2e;
      --line:  #2a2a4a;
      --text:  #e8e8f0;
      --dim:   #5a5a88;
      --music: #4fc3f7;
      --red:   #ef5350;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .box {
      width: 100%;
      max-width: 340px;
      background: var(--card);
      border-radius: 14px;
      padding: 32px 28px;
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .1em;
      color: var(--text);
    }
    .logo p {
      font-size: 12px;
      color: var(--dim);
      margin-top: 4px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--dim);
      letter-spacing: .06em;
      margin-bottom: 8px;
    }

    input[type=password] {
      width: 100%;
      background: #0f0f17;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 15px;
      outline: none;
      transition: border-color .15s;
    }
    input[type=password]:focus { border-color: var(--music); }

    .error {
      font-size: 12px;
      color: var(--red);
      margin-top: 8px;
      min-height: 16px;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: var(--music);
      color: #000;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
    }
    button:hover  { opacity: .85; }
    button:active { opacity: .7; }
  </style>
</head>
<body>
<div class="box">
  <div class="logo">
    <h1>ПАРКОВОЕ РАДИО</h1>
    <p>Введите пароль для доступа</p>
  </div>
  <form method="post">
    <label for="pwd">ПАРОЛЬ</label>
    <input type="password" id="pwd" name="password" autofocus autocomplete="current-password">
    <div class="error">{{ error or '' }}</div>
    <button type="submit">Войти</button>
  </form>
</div>
</body>
</html>
